<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 小卡商店</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body{
        background:#fafdff;
        font-family:Arial;
    }

    .navbar{
        background:#fff;
        box-shadow:0 2px 4px rgba(0,0,0,.05);
    }

    /* 商品卡 */
    .card{
        border:none;
        border-radius:16px;
        box-shadow:0 6px 12px rgba(0,0,0,.05);
        overflow:hidden;
        height:100%;
    }

    .product-img-wrapper{
        aspect-ratio:2/3;
        overflow:hidden;
    }

    .product-img{
        width:100%;
        height:100%;
        object-fit:cover;
    }

    /* 購物車 */
    .floating-cart-btn{
        position:fixed;
        bottom:25px;
        right:25px;
        width:65px;
        height:65px;
        background:#ff5b75;
        color:#fff;
        border-radius:50%;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:26px;
        border:none;
    }

    .cart-badge{
        position:absolute;
        top:-2px;
        right:-2px;
        background:#fff;
        color:#ff5b75;
        border-radius:50%;
        border:2px solid #ff5b75;
        font-size:12px;
        padding:2px 6px;
    }
    </style>
</head>

<body>

    <!-- NAV -->
    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-between align-items-center">

        <div class="fw-bold text-danger">✨ 小卡商店</div>

        <!-- 桌機登入 -->
        <div id="auth-zone" class="d-none d-lg-flex gap-2">
            <input id="loginEmail" class="form-control form-control-sm" placeholder="Email" style="width:150px;">
            <input id="loginPwd" type="password" class="form-control form-control-sm" placeholder="密碼" style="width:120px;">
            <button class="btn btn-primary btn-sm" onclick="handleLogin()">登入</button>
            <button class="btn btn-sm btn-dark" data-bs-toggle="modal" data-bs-target="#regModal">註冊</button>
        </div>

        <!-- 手機登入 -->
        <div id="mobile-auth" class="d-flex d-lg-none gap-2">
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#loginModal">登入</button>
            <button class="btn btn-dark btn-sm" data-bs-toggle="modal" data-bs-target="#regModal">註冊</button>
        </div>

        <!-- 已登入 -->
        <div id="user-zone" class="d-none">
            🟢 <span id="current-user-name"></span>
            <button class="btn btn-sm btn-secondary" onclick="handleLogout()">登出</button>
        </div>

        </div>
    </nav>

        <div class="container mb-5">
        <h3 class="fw-bold mb-3">🌟 現貨區</h3>
        
        <div class="row row-cols-2 row-cols-md-5 g-3">
            
            <div class="col">
                <div class="card h-100">
                    <div class="product-img-wrapper"><img src="https://i.pinimg.com/736x/14/fa/4c/14fa4c988aec277da04ce9392ce97e32.jpg" class="product-img" alt="Wonwoo"></div>
                    <div class="card-body d-flex flex-column p-2">
                        <h6 class="fw-bold mb-1" style="font-size: 14px;">Wonwoo</h6>
                        <p class="text-muted flex-grow-1 mb-2" style="font-size: 12px;">UMS特典卡</p>
                        <div class="d-flex justify-content-between align-items-center mt-auto">
                            <span class="fw-bold text-danger">$350</span>
                            <button class="btn btn-sm btn-primary" onclick="addToCart('Wonwoo回歸特典卡', 350)">🛒</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100">
                    <div class="product-img-wrapper"><img src="https://i.pinimg.com/736x/30/87/21/3087214f40165a25e18ee79ca57170e6.jpg" class="product-img" alt="JK"></div>
                    <div class="card-body d-flex flex-column p-2">
                        <h6 class="fw-bold mb-1" style="font-size: 14px;">JK</h6>
                        <p class="text-muted flex-grow-1 mb-2" style="font-size: 12px;">簽售特典卡</p>
                        <div class="d-flex justify-content-between align-items-center mt-auto">
                            <span class="fw-bold text-danger">$480</span>
                            <button class="btn btn-sm btn-primary" onclick="addToCart('JK簽售特典卡', 480)">🛒</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100">
                    <div class="product-img-wrapper"><img src="https://i.pinimg.com/1200x/f1/a1/8a/f1a18aa1e340c10c44614b74780d565e.jpg" class="product-img" alt="V"></div>
                    <div class="card-body d-flex flex-column p-2">
                        <h6 class="fw-bold mb-1" style="font-size: 14px;">V</h6>
                        <p class="text-muted flex-grow-1 mb-2" style="font-size: 12px;">世巡入場卡</p>
                        <div class="d-flex justify-content-between align-items-center mt-auto">
                            <span class="fw-bold text-danger">$290</span>
                            <button class="btn btn-sm btn-primary" onclick="addToCart('泰亨世巡入場卡', 290)">🛒</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100">
                    <div class="product-img-wrapper"><img src="https://i.pinimg.com/736x/37/55/b9/3755b931cef706b327dda12c83395e2f.jpg" class="product-img" alt="DK"></div>
                    <div class="card-body d-flex flex-column p-2">
                        <h6 class="fw-bold mb-1" style="font-size: 14px;">DK</h6>
                        <p class="text-muted flex-grow-1 mb-2" style="font-size: 12px;">周年紀念卡</p>
                        <div class="d-flex justify-content-between align-items-center mt-auto">
                            <span class="fw-bold text-danger">$550</span>
                            <button class="btn btn-sm btn-primary" onclick="addToCart('DK周年紀念卡', 550)">🛒</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100">
                    <div class="product-img-wrapper"><img src="https://i.pinimg.com/1200x/18/e4/56/18e456c39bffa1aa2ef7ca8ce3ab8462.jpg" class="product-img" alt="Jeonghan"></div>
                    <div class="card-body d-flex flex-column p-2">
                        <h6 class="fw-bold mb-1" style="font-size: 14px;">Jeonghan</h6>
                        <p class="text-muted flex-grow-1 mb-2" style="font-size: 12px;">WVS特典卡</p>
                        <div class="d-flex justify-content-between align-items-center mt-auto">
                            <span class="fw-bold text-danger">$550</span>
                            <button class="btn btn-sm btn-primary" onclick="addToCart('Jeonghan-WVS特典卡', 550)">🛒</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>


        <!-- 購物車 -->
        <button class="floating-cart-btn" data-bs-toggle="offcanvas" data-bs-target="#cart">
        🛒 <span id="cart-badge" class="cart-badge d-none">0</span>
        </button>

        <div class="offcanvas offcanvas-end" id="cart">
        <div class="offcanvas-header bg-danger text-white">
        <h5>購物車</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body">
        <div id="cart-list">空</div>
        <hr>
        總計：$<span id="total">0</span>
        <button class="btn btn-danger w-100 mt-3" onclick="checkout()">下單</button>
        </div>
        </div>

        <!-- 手機登入 -->
        <div class="modal fade" id="loginModal">
        <div class="modal-dialog modal-sm">
        <div class="modal-content p-3">
        <input id="m_email" class="form-control mb-2" placeholder="Email">
        <input id="m_pwd" type="password" class="form-control mb-2" placeholder="密碼">
        <button class="btn btn-primary w-100" onclick="loginMobile()">登入</button>
        </div>
        </div>
        </div>

        <!-- 註冊 -->
        <div class="modal fade" id="regModal">
        <div class="modal-dialog modal-sm">
        <div class="modal-content p-3">
        <input id="r_name" class="form-control mb-2" placeholder="暱稱">
        <input id="r_email" class="form-control mb-2" placeholder="Email">
        <input id="r_phone" class="form-control mb-2" placeholder="電話">
        <input id="r_pwd" class="form-control mb-2" placeholder="密碼">
        <button class="btn btn-primary w-100" onclick="register()">註冊</button>
        </div>
        </div>
        </div>

        <script>
        const API = "https://script.google.com/macros/s/AKfycbwlxR9mNoFhhC-Tp7pHXtcIov9YECTOh8nAk3XKA69SoOhJRMYmIU4_ZT8jru-NDZQJTw/exec";

        let user=null;
        let cart=[];

        /* 桌機登入 */
        async function handleLogin(){
        loginCore("loginEmail","loginPwd");
        }

        /* 手機登入 */
        async function loginMobile(){
        loginCore("m_email","m_pwd");
        }

        /* 共用登入 */
        async function loginCore(e,p){

            const email=document.getElementById(e).value;
            const pwd=document.getElementById(p).value;

            const fd=new URLSearchParams();
            fd.append("type","login");
            fd.append("email",email);
            fd.append("pwd",pwd);

            const res=await fetch(API,{method:"POST",body:fd});
            const r=await res.json();

            if (r.success) {

                user = { name: r.name, email };

                document.getElementById("auth-zone")?.classList.add("d-none");
                document.getElementById("mobile-auth")?.classList.add("d-none");

                document.getElementById("user-zone")?.classList.remove("d-none");
                document.getElementById("current-user-name").innerText = r.name;

                alert("登入成功");

            } else {
                alert(r.message);
            }
        }

        /* 登出 */
        function handleLogout(){

        user=null;

        document.getElementById("auth-zone").classList.remove("d-none");
        document.getElementById("mobile-auth").classList.remove("d-none");
        document.getElementById("user-zone").classList.add("d-none");
        }

        /* 註冊 */
        async function register(){

            const fd=new URLSearchParams();
            fd.append("type","register");
            fd.append("name",document.getElementById("r_name").value);
            fd.append("email",document.getElementById("r_email").value);
            fd.append("phone",document.getElementById("r_phone").value);
            fd.append("pwd",document.getElementById("r_pwd").value);

            await fetch(API,{method:"POST",body:fd});
            alert("註冊成功");
        }

        /* 購物車 */
        function addToCart(n,p){

        let i=cart.find(x=>x.name===n);
        if(i)i.qty++;
        else cart.push({name:n,price:p,qty:1});

        render();
        }

        function render(){

        let h="",t=0,q=0;

        cart.forEach(i=>{
        h+=`<div>${i.name} x${i.qty}</div>`;
        t+=i.price*i.qty;
        q+=i.qty;
        });

        document.getElementById("cart-list").innerHTML=h;
        document.getElementById("total").innerText=t;

        let b=document.getElementById("cart-badge");
        b.innerText=q;
        b.classList.remove("d-none");
        }

        /* 下單 */
        async function checkout(){

        if(!user) return alert("先登入");
        if(cart.length==0) return alert("空的");

        const fd=new URLSearchParams();
        fd.append("type","order");
        fd.append("buyerEmail",user.email);
        fd.append("cartItems",JSON.stringify(cart));
        fd.append("total",document.getElementById("total").innerText);

        await fetch(API,{method:"POST",body:fd});

        alert("下單成功");
        cart=[];
        render();
        }
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
