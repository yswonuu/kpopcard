<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 K-POP 夢幻明星真實抽卡機 🌟</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --text-color: #ffffff;
            --ssr-color: #ff007f;
            --sr-color: #ffaa00;
            --r-color: #00d2ff;
            --n-color: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.7);
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            color: #66fcf1;
            margin-bottom: 30px;
            text-align: center;
            font-size: 14px;
        }

        .btn-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(45deg, #ff007f, #ffaa00);
            border: none;
            color: white;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.6);
        }

        .btn-ten {
            background: linear-gradient(45deg, #00d2ff, #00fff0);
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            color: #000;
        }

        .btn-ten:hover {
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.6);
        }

        .btn-reveal {
            background: #ffffff;
            color: #000;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
            display: none;
        }

        .btn-reveal:hover {
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.4);
        }

        .tip-text {
            color: #888888;
            font-size: 13px;
            margin-bottom: 20px;
            height: 20px;
        }

        /* 卡片網格 */
        .card-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }

        /* 3D 卡片外殼 */
        .card-container {
            width: 230px;
            height: 350px;
            perspective: 1000px;
            cursor: pointer;
        }

        /* 3D 翻轉核心 */
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotateY(180deg);
        }

        /* 當被加上 .is-flipped 類別時翻轉到正面 */
        .card.is-flipped {
            transform: rotateY(0deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 3px solid transparent;
            box-sizing: border-box;
        }

        /* 卡片正面 */
        .card-front {
            background-color: var(--card-bg);
            transform: rotateY(0deg);
        }

        /* 卡片背面 */
        .card-back {
            background: linear-gradient(135deg, #15161e 0%, #2c3540 100%);
            transform: rotateY(180deg);
            border-color: #4f5d75;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card-back::after {
            content: "✨\nK-POP\nCARD\n✨";
            white-space: pre-line;
            text-align: center;
            font-weight: bold;
            color: #66fcf1;
            font-size: 16px;
            letter-spacing: 3px;
            text-shadow: 0 0 8px rgba(102, 252, 241, 0.5);
        }

        /* 圖片區域 */
        .card-img-wrapper {
            width: 100%;
            height: 82%;
            position: relative;
            background-color: #111;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            z-index: 2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .badge-SSR { background-color: var(--ssr-color); color: white; }
        .badge-SR  { background-color: var(--sr-color); color: black; }
        .badge-R   { background-color: var(--r-color); color: black; }
        .badge-N   { background-color: var(--n-color); color: white; }

        /* 稀有度框線光暈 */
        .rarity-SSR { border-color: var(--ssr-color); box-shadow: 0 0 20px rgba(255, 0, 127, 0.6); }
        .rarity-SR  { border-color: var(--sr-color); box-shadow: 0 0 15px rgba(255, 170, 0, 0.5); }
        .rarity-R   { border-color: var(--r-color); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
        .rarity-N   { border-color: var(--n-color); }

        /* 下半部文字區 */
        .card-info {
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: center;
            background: linear-gradient(to bottom, #1f2833, #151a21);
        }

        .group-name {
            font-size: 10px;
            color: #66fcf1;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .member-name {
            font-size: 15px;
            font-weight: bold;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <h1>🎴 K-POP 夢幻明星卡池 🎴</h1>
    <div class="subtitle">親手翻開屬於你的專屬小卡，快叫朋友來拼手氣！</div>

    <div class="btn-container">
        <button onclick="drawCard(1)">單抽試手氣</button>
        <button class="btn-ten" onclick="drawCard(10)">不重複十連抽！</button>
        <button id="revealBtn" class="btn-reveal" onclick="revealAllCards()">一鍵全翻開</button>
    </div>

    <div class="tip-text" id="tipText"></div>

    <div class="card-grid" id="displayArea"></div>

    <script>
        // 原始卡池基礎資料[cite: 2]
        const baseCards = [
            { id: 1, rarity: "SSR", group: "BTS", name: "柾國 (Jung Kook)", img: "https://i.pinimg.com/736x/30/87/21/3087214f40165a25e18ee79ca57170e6.jpg"}, //[cite: 2]
            { id: 2, rarity: "SSR", group: "SEVENTEEN", name: "淨漢 (Jeonghan)", img: "https://i.pinimg.com/1200x/18/e4/56/18e456c39bffa1aa2ef7ca8ce3ab8462.jpg" }, //[cite: 2]
            { id: 3, rarity: "SSR", group: "BTS", name: "泰亨 (V)", img: "https://i.pinimg.com/1200x/f1/a1/8a/f1a18aa1e340c10c44614b74780d565e.jpg"}, //[cite: 2]
            { id: 4, rarity: "SSR", group: "BTS", name: "碩珍 (Jin)", img: "https://i.pinimg.com/736x/42/b5/cf/42b5cfcd98a5bc7354ce6a8748258c1b.jpg"}, //[cite: 2]
            { id: 5, rarity: "SSR", group: "SEVENTEEN", name: "碩珉 (DK)", img: "https://i.pinimg.com/1200x/ed/5d/fa/ed5dfa3f078793a8dbddc5c4337bf52e.jpg"}, //[cite: 2]
            { id: 6, rarity: "SR",  group: "BTS", name: "泰亨 (V)", img: "https://i.pinimg.com/736x/56/f5/2f/56f52fed1d4d5d82ddb75a551b1128e5.jpg"}, //[cite: 2]
            { id: 7, rarity: "SR",  group: "BTS", name: "柾國 (Jung Kook)", img: "https://i.pinimg.com/736x/ca/6f/02/ca/ca6f02ac17237aa0ca046f177a40920b.jpg"}, //[cite: 2]
            { id: 8, rarity: "SR",  group: "SEVENTEEN", name: "淨漢 (Jeonghan)", img: "https://i.pinimg.com/1200x/6e/d7/54/6ed7541da0346dbccf421b6af7457dcc.jpg"}, //[cite: 2]
            { id: 9, rarity: "SR",  group: "SEVENTEEN", name: "圓佑 (Wonwoo)", img: "https://i.pinimg.com/736x/14/fa/4c/14fa4c988aec277da04ce9392ce97e32.jpg"}, //[cite: 2]
            { id: 10, rarity: "SR", group: "SEVENTEEN", name: "碩珉 (DK)", img: "https://i.pinimg.com/736x/37/55/b9/3755b931cef706b327dda12c83395e2f.jpg"}, //[cite: 2]
            { id: 11, rarity: "SR",   group: "SEVENTEEN", name: "珉奎 (Mingyu)", img: "https://i.pinimg.com/736x/65/1c/73/651c734281e9c4ba4def3ef07553de28.jpg"}, //[cite: 2]
            { id: 11, rarity: "R",   group: "SEVENTEEN", name: "珉奎 (Mingyu)", img: "https://i.pinimg.com/736x/78/dd/75/78dd757e93f2ef197414353c43822221.jpg"}, //[cite: 2]
            { id: 12, rarity: "R",   group: "SEVENTEEN", name: "順榮 (Hoshi)", img: "https://i.pinimg.com/736x/c4/4f/5e/c44f5e8c8f4044fd8a7195ffb894b5f9.jpg"}, //[cite: 2]
            { id: 13, rarity: "R",   group: "SEVENTEEN", name: "圓佑 (Wonwoo)", img: "https://i.pinimg.com/1200x/ab/ac/2b/abac2bfd3e0c00a2fa7d31397a05ef61.jpg"}, //[cite: 2]
            { id: 14, rarity: "R",   group: "BTS", name: "泰亨 (V)", img: "https://i.pinimg.com/736x/41/ae/33/41ae3351f21f0d4bba407999fb56c6b4.jpg"}, //[cite: 2]
            { id: 15, rarity: "N",  group: "SEVENTEEN", name: "勝寛", img: "https://i.pinimg.com/736x/74/bd/9d/74bd9d678bfc52b554d6aecb0192f5f2.jpg"}, //[cite: 2]
            { id: 16, rarity: "N",   group: "SEVENTEEN", name: "順榮 (Hoshi)", img: "https://i.pinimg.com/1200x/ca/f3/40/caf3403c821c66d47b9ceab1f5bd4ece.jpg"}, //[cite: 2]
            { id: 17, rarity: "N",   group: "SEVENTEEN", name: "珉奎 (Mingyu)", img: "https://i.pinimg.com/736x/02/9f/c0/029fc00641c9b23931cf5815b1ae991a.jpg"}, //[cite: 2]
            { id: 18, rarity: "N",   group: "SEVENTEEN", name: "碩珉 (DK)", img: "https://i.pinimg.com/736x/37/97/8f/37978f70a060d7dbb525c8e07cec364b.jpg"}, //[cite: 2]
        ];

        // 隨機洗牌演算法
        function shufflePool(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function drawCard(times) {
            const displayArea = document.getElementById("displayArea");
            const revealBtn = document.getElementById("revealBtn");
            const tipText = document.getElementById("tipText");
            
            displayArea.innerHTML = ""; 
            tipText.innerText = "點擊卡片即可單獨翻開！";
            revealBtn.style.display = "inline-block";

            let results = [];

            if (times === 1) {
                // 單抽：維持完全隨機
                const randomIndex = Math.floor(Math.random() * baseCards.length);
                results.push(baseCards[randomIndex]);
            } else {
                // 十連抽：限制最多 1 張 SSR，且最多 2 張 SR
                let shuffledPool = shufflePool(baseCards);
                let ssrCount = 0;
                let srCount = 0;

                for (let i = 0; i < shuffledPool.length; i++) {
                    if (results.length >= 10) break; // 抽滿 10 張就停

                    const currentCard = shuffledPool[i];

                    if (currentCard.rarity === "SSR") {
                        if (ssrCount < 1) {
                            results.push(currentCard);
                            ssrCount++;
                        }
                    } else if (currentCard.rarity === "SR") {
                        if (srCount < 2) {
                            results.push(currentCard);
                            srCount++;
                        }
                    } else {
                        // R 或 N 卡正常放入
                        results.push(currentCard);
                    }
                }
            }

            // 渲染卡片 HTML
            results.forEach((cardData, i) => {
                const cardContainer = document.createElement("div");
                cardContainer.className = "card-container";
                
                cardContainer.onclick = function() {
                    const cardInner = this.querySelector('.card');
                    cardInner.classList.toggle('is-flipped');
                };

                cardContainer.innerHTML = `
                    <div class="card">
                        <!-- 卡片正面 -->
                        <div class="card-face card-front rarity-${cardData.rarity}">
                            <div class="card-img-wrapper">
                                <span class="badge badge-${cardData.rarity}">${cardData.rarity}</span>
                                <img class="card-img" src="${cardData.img}" alt="${cardData.name}">
                            </div>
                            <div class="card-info">
                                <div class="group-name">${cardData.group}</div>
                                <div class="member-name">${cardData.name}</div>
                            </div>
                        </div>
                        <!-- 卡片背面 -->
                        <div class="card-face card-back"></div>
                    </div>
                `;
                displayArea.appendChild(cardContainer);
            });
        }

        function revealAllCards() {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                card.classList.add('is-flipped');
            });
        }
    </script>
</body>
</html>
